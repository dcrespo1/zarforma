kind: ZarfPackageConfig
metadata:
  name: kube-prometheus-stack
  version: 0.0.1

components:
  - name: kube-prometheus-stack
    required: true
    charts:
      - name: kube-prometheus-stack
        url: https://prometheus-community.github.io/helm-charts
        version: 82.16.2
        namespace: monitoring
    images:
      - docker.io/grafana/grafana:12.4.2
      - quay.io/kiwigrid/k8s-sidecar:2.5.4
      - quay.io/prometheus-operator/prometheus-operator:v0.89.0
      - ghcr.io/jkroepke/kube-webhook-certgen:1.8.0
      - quay.io/prometheus/node-exporter:v1.10.2
      - registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
      - quay.io/prometheus/alertmanager:v0.31.1
      - quay.io/prometheus/prometheus:v3.11.0
      - quay.io/prometheus-operator/prometheus-config-reloader:v0.89.0
      - quay.io/prometheus-operator/admission-webhook:v0.89.0
      - quay.io/thanos/thanos:v0.41.0
      - docker.io/busybox:latest
      - registry.k8s.io/kubectl:v1.33.6
